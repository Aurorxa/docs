name: Translate-test

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      source_dir:
        description: "Source directory containing Markdown files"
        required: false
        default: './docs/notes'
      target_dir:
        description: "Target directory for translated Markdown files"
        required: false
        default: './docs/en'
      from_lang:
        description: "Language to translate from (e.g., zh)"
        required: false
        default: 'zh'
      to_lang:
        description: "Language to translate to (e.g., en)"
        required: false
        default: 'en'

env:
  SOURCE_DIR: ${{ inputs.source_dir }}
  TARGET_DIR: ${{ inputs.target_dir }}
  FROM_LANG: ${{ inputs.from_lang }}
  TO_LANG: ${{ inputs.to_lang }}

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 1
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0  
      - name: Install Translation Dependencies
        run: |
           sudo apt-get update -y
           sudo apt-get install -y tree
           tree
           npm install google-translate-api
      - name: Ensure Target Directory Exists
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const targetPath = process.env.TARGET_DIR;

          console.log('targetPath ==>',targetPath);

          try {
            fs.mkdirSync(targetPath, { recursive: true });
            console.log(\`Target directory \${targetPath} is ready.\`);
          } catch (err) {
            console.error(\`Failed to create target directory \${targetPath}: \`, err);
            process.exit(1);
          }
          "                
      - name: Translate Markdown Files
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const translate = require('google-translate-api');
          
          const directoryPath = process.env.SOURCE_DIR;
          const targetPath = process.env.TARGET_DIR;
          const fromLang = process.env.FROM_LANG;
          const toLang = process.env.TO_LANG;
          
          function translateMarkdownFiles(dir) {
            const files = fs.readdirSync(dir);

            files.forEach(file => {
              const fullPath = path.join(dir, file);
              const stat = fs.lstatSync(fullPath);

              if (stat.isDirectory()) {
                translateMarkdownFiles(fullPath);
              } else if (file.endsWith('.md')) {
                const content = fs.readFileSync(fullPath, 'utf8');
                translate(content, { from: fromLang, to: toLang })
                  .then(res => {
                    const translatedPath = fullPath.replace(directoryPath, targetPath);
                    fs.mkdirSync(path.dirname(translatedPath), { recursive: true });
                    fs.writeFileSync(translatedPath, res.text, 'utf8');
                    console.log(\`Translated \${fullPath} -> \${translatedPath}\`);
                  })
                  .catch(err => console.error(\`Error translating \${fullPath}: \${err}\`));
              }
            });
          }

          translateMarkdownFiles(directoryPath);
          "    
      - name: 查看翻译后的文件
        run: |
           tree
       
 
    


