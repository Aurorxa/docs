name: Translate-test

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      source_dir:
        description: "Source directory containing Markdown files"
        required: false
        default: 'docs/notes'
      target_dir:
        description: "Target directory for translated Markdown files"
        required: false
        default: 'docs/en'
      from_lang:
        description: "Language to translate from (e.g.,zh-CHS)"
        required: false
        default: 'zh-CHS'
      to_lang:
        description: "Language to translate to (e.g., en)"
        required: false
        default: 'en'

env:
  SOURCE_DIR: ${{ inputs.source_dir }}
  TARGET_DIR: ${{ inputs.target_dir }}
  FROM_LANG: ${{ inputs.from_lang }}
  TO_LANG: ${{ inputs.to_lang }}
  YOUDAO_APP_KEY: ${{ secrets.YOUDAO_APP_KEY }}
  YOUDAO_SECRET: ${{ secrets.YOUDAO_SECRET }}

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 1
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0  
      - name: Install Dependencies
        run: |
           sudo apt-get update -y
           sudo apt-get install -y tree
           tree
      # - name: Ensure Target Directory Exists
      #   run: |
      #     if [ -z "${{ env.TARGET_DIR }}" ]; then
      #       echo "TARGET_DIR is empty. Please specify a valid directory."
      #       exit 1
      #     fi

      #     if [ ! -d "${{ env.TARGET_DIR }}" ]; then
      #       mkdir -p "${{ env.TARGET_DIR }}"
      #       echo "Target directory ${{ env.TARGET_DIR }} created."
      #     else
      #       echo "Target directory ${{ env.TARGET_DIR }} already exists."
      #     fi

      - name: Install Axios for HTTP Requests
        run: npm install axios

      - name: Translate Markdown Files
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const axios = require('axios');
          const crypto = require('crypto');

          const directoryPath = process.env.SOURCE_DIR;
          const targetPath = process.env.TARGET_DIR;
          const fromLang = process.env.FROM_LANG;
          const toLang = process.env.TO_LANG;
          const appKey = process.env.YOUDAO_APP_KEY;
          const secret = process.env.YOUDAO_SECRET;

          function generateSign(query, salt) {
            return crypto.createHash('md5').update(appKey + query + salt + secret).digest('hex');
          }

          async function translateText(query) {
            const salt = new Date().getTime();
            const sign = generateSign(query, salt);
            const url = 'https://openapi.youdao.com/api';

            const params = {
              q: query,
              appKey: appKey,
              salt: salt,
              from: fromLang,
              to: toLang,
              sign: sign,
            };

            try {
              const response = await axios.get(url, { params });
              if (response.data && response.data.translation) {
                return response.data.translation.join('\\n');
              } else {
                console.error('Translation error:', response.data);
                return '';
              }
            } catch (err) {
              console.error('HTTP request failed:', err.message);
              return '';
            }
          }

          async function translateMarkdownFiles(dir) {
            const files = fs.readdirSync(dir);

            for (const file of files) {
              const fullPath = path.join(dir, file);
              const stat = fs.lstatSync(fullPath);

              if (stat.isDirectory()) {
                await translateMarkdownFiles(fullPath);
              } else if (file.endsWith('.md')) {
                const content = fs.readFileSync(fullPath, 'utf8');
                const translatedPath = fullPath.replace(directoryPath, targetPath);
                const translatedText = await translateText(content);

                if (translatedText) {
                  fs.mkdirSync(path.dirname(translatedPath), { recursive: true });
                  fs.writeFileSync(translatedPath, translatedText, 'utf8');
                  console.log(\`Translated \${fullPath} -> \${translatedPath}\`);
                } else {
                  console.error(\`Failed to translate \${fullPath}\`);
                }
              }
            }
          }

          (async () => {
            console.log(\`Translating files from \${directoryPath} to \${targetPath} (\${fromLang} -> \${toLang})\`);
            await translateMarkdownFiles(directoryPath);
          })();
          "    
      - name: 查看翻译后的文件
        run: |
           tree
       
 
    


